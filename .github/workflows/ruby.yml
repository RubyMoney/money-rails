# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # JRuby is pinned to 10.0.5.0: 10.1.0.0 ships an activerecord-jdbc-adapter
        # that calls a JRuby internal constructor removed in 10.1, breaking the DB
        # tasks (https://github.com/jruby/activerecord-jdbc-adapter). 10.0.5.0 is the
        # last version known to pass. Unpin once arjdbc supports JRuby 10.1.
        ruby-version: ['3.1', '3.2', '3.3', '3.4', '4.0', 'head', 'jruby-10.0.5.0']
        mongodb-version: ['7.0']

    name: Test (Ruby ${{ matrix.ruby-version }}, MongoDB ${{ matrix.mongodb-version }})

    steps:
    - uses: actions/checkout@v6

    - name: Set up Java for JRuby
      if: startsWith(matrix.ruby-version, 'jruby')
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'

    - name: Set up Ruby
    # To automatically get bug fixes and new Ruby versions for ruby/setup-ruby,
    # change this to (see https://github.com/ruby/setup-ruby#versioning):
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}

    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.3.0
      with:
        mongodb-version: ${{ matrix.mongodb-version }}

    - name: Install gems
      run: bundle install

    - name: Run tests
      run: bundle exec rake
